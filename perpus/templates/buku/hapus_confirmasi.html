{% extends 'base.html' %}
{% block content %}
<div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm max-w-md mx-auto text-center mt-12">
    <div class="w-12 h-12 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto text-xl mb-4"><i class="fa-solid fa-triangle-exclamation"></i></div>
    <h2 class="text-lg font-bold text-slate-900">Hapus Data Buku?</h2>
    <p class="text-xs text-slate-500 mt-2 leading-relaxed">Apakah Kakak yakin ingin menghapus data buku <span class="font-semibold text-slate-800">"{{ buku.judul }}"</span>? Tindakan ini permanen dan tidak bisa dibatalkan.</p>
    <form method="POST" class="mt-6 flex space-x-3 justify-center">
        {% csrf_token %}
        <a href="{% url 'list_buku' %}" class="px-4 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-semibold transition">Batal</a>
        <button type="submit" class="px-4 py-2 rounded-xl bg-rose-600 hover:bg-rose-700 text-white text-xs font-semibold transition shadow-sm">Ya, Hapus</button>
    </form>
</div>
{% endblock %}
