{% extends 'base.html' %}
{% block content %}
<div class="mb-6">
    <a href="{% url 'list_buku' %}" class="text-xs text-slate-400 hover:text-blue-600 transition flex items-center space-x-1 mb-2">
        <i class="fa-solid fa-arrow-left"></i> <span>Kembali ke daftar</span>
    </a>
    <h2 class="text-2xl font-bold text-slate-950">{% if buku %}Edit{% else %}Tambah{% endif %} Buku</h2>
</div>

<div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm max-w-3xl">
    <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-5">
            <div class="col-span-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Judul Buku</label>
                <input type="text" name="judul" value="{{ buku.judul }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Pengarang</label>
                <input type="text" name="pengarang" value="{{ buku.pengarang }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Kategori</label>
                <input type="text" name="kategori" value="{{ buku.kategori }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Penerbit</label>
                <input type="text" name="penerbit" value="{{ buku.penerbit }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Tahun Terbit</label>
                <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Lokasi Rak</label>
                <input type="text" name="rak" value="{{ buku.rak }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Stok Awal</label>
                <input type="number" name="stok" value="{{ buku.stok }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div class="col-span-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nomor ISBN</label>
                <input type="text" name="isbn" value="{{ buku.isbn }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div class="col-span-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Deskripsi Singkat</label>
                <textarea name="deskripsi" rows="3" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">{{ buku.deskripsi }}</textarea>
            </div>
        </div>
        <div class="flex justify-end space-x-3 pt-3 border-t border-slate-100">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition shadow-sm">Simpan Buku</button>
        </div>
    </form>
</div>
{% endblock %}
