<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Perpustakaan</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="flex min-h-screen">
        
        <aside class="w-64 bg-[#090e1a] text-slate-200 flex flex-col justify-between p-5 fixed h-full z-10">
            <div>
                <div class="flex items-center gap-3 px-2 py-4 mb-6">
                    <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-500/30">
                        P
                    </div>
                    <div>
                        <span class="text-[10px] text-slate-500 tracking-widest block font-bold uppercase">Sipustaka</span>
                        <h1 class="text-sm font-bold text-white tracking-wide">Sistem Peminjaman Buku</h1>
                    </div>
                </div>

                <nav class="space-y-1">
                    <a href="/dashboard/" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-900 hover:text-slate-200 transition-all">
                        <i class="fa-solid fa-chart-pie w-5 text-center"></i>
                        Dashboard
                    </a>
                    <a href="/buku/" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-900 hover:text-slate-200 transition-all">
                        <i class="fa-solid fa-book w-5 text-center"></i>
                        Buku
                    </a>
                    <a href="/peminjaman/" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-900 hover:text-slate-200 transition-all">
                        <i class="fa-solid fa-box-archive w-5 text-center"></i>
                        Peminjaman
                    </a>
                    <a href="/user/" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-slate-900 hover:text-slate-200 transition-all">
                        <i class="fa-solid fa-users w-5 text-center"></i>
                        User
                    </a>
                </nav>
            </div>

            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800/40">
                <span class="text-[10px] text-slate-500 font-medium block">Admin Aktif</span>
                <span class="text-xs font-bold text-white block mt-0.5">umair abdurrozzaq</span>
            </div>
        </aside>

        <main class="flex-1 ml-64 p-8">
            {% block content %}
            {% endblock %}
        </main>
    </div>

</body>
</html>
