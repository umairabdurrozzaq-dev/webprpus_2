{% extends 'base.html' %}
{% block content %}
<div class="mb-6">
    <a href="{% url 'list_peminjaman' %}" class="text-xs text-slate-400 hover:text-blue-600 transition flex items-center space-x-1 mb-2">
        <i class="fa-solid fa-arrow-left"></i> <span>Kembali</span>
    </a>
    <h2 class="text-2xl font-bold text-slate-950">Formulir Peminjaman Buku</h2>
</div>

<div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm max-w-xl">
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Pilih Siswa (Peminjam)</label>
            <select name="siswa_id" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition bg-white">
                <option value="">-- Cari Nama Siswa --</option>
                {% for s in siswa_choices %}
                <option value="{{ s.id }}">{{ s.nama }} ({{ s.nis }})</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Pilih Buku Koleksi</label>
            <select name="buku_id" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition bg-white">
                <option value="">-- Cari Judul Buku (Tersedia) --</option>
                {% for b in buku_choices %}
                <option value="{{ b.id }}">{{ b.judul }} [Sisa: {{ b.stok }}]</option>
                {% endfor %}
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Tanggal Pinjam</label>
                <input type="date" name="tanggal_pinjam" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Batas Jatuh Tempo</label>
                <input type="date" name="jatuh_tempo" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Keperluan Pinjam</label>
            <textarea name="keperluan" rows="2" placeholder="Contoh: Tugas mandiri Bahasa Indonesia" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition"></textarea>
        </div>
        <div class="flex justify-end pt-4 border-t border-slate-100">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition shadow-sm">Konfirmasi Pinjam</button>
        </div>
    </form>
</div>
{% endblock %}
