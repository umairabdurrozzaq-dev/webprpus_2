{% extends 'base.html' %}
{% block content %}
<div class="mb-6">
    <a href="{% url 'list_user' %}" class="text-xs text-slate-400 hover:text-blue-600 transition flex items-center space-x-1 mb-2">
        <i class="fa-solid fa-arrow-left"></i> <span>Kembali</span>
    </a>
    <h2 class="text-2xl font-bold text-slate-950">{% if user %}Edit{% else %}Tambah{% endif %} Anggota Siswa</h2>
</div>

<div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm max-w-xl">
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nama Lengkap</label>
            <input type="text" name="nama" value="{{ user.nama }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nomor Induk Siswa (NIS)</label>
                <input type="text" name="nis" value="{{ user.nis }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Kelas</label>
                <input type="text" name="kelas" value="{{ user.kelas }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition">
            </div>
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Status Kartu Anggota</label>
            <select name="status" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:border-blue-500 transition bg-white">
                <option value="Aktif" {% if user.is_active %}selected{% endif %}>Aktif / Berizin Pinjam</option>
                <option value="Nonaktif" {% if user and not user.is_active %}selected{% endif %}>Nonaktif / Ditangguhkan</option>
            </select>
        </div>
        <div class="flex justify-end pt-4 border-t border-slate-100">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition shadow-sm">Simpan Data</button>
        </div>
    </form>
</div>
{% endblock %}
